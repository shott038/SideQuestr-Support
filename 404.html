<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SideQuestr</title>
    <meta property="og:title" content="Join me on SideQuestr">
    <meta property="og:description" content="Discover, visit, and save spots with friends.">
    <meta property="og:type" content="website">
    <meta name="apple-itunes-app" content="app-id=6740043095">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1a1f;
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
            text-align: center;
        }
        .logo {
            font-size: 44px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #7dd3c0, #4a90d9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .tagline {
            font-size: 15px;
            color: #8a9aa0;
            margin-bottom: 48px;
        }
        .invite-card {
            background: #1a2a30;
            border: 1px solid #2a3a40;
            border-radius: 20px;
            padding: 32px 24px;
            max-width: 380px;
            width: 100%;
            margin-bottom: 24px;
        }
        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 36px;
            background: linear-gradient(135deg, #7dd3c0, #4a90d9);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            color: #0f1a1f;
        }
        .handle {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .invite-text {
            font-size: 15px;
            color: #8a9aa0;
            margin-bottom: 24px;
        }
        .cta {
            display: inline-block;
            background: #ffffff;
            color: #0f1a1f;
            padding: 16px 32px;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            text-decoration: none;
            margin-bottom: 12px;
            width: 100%;
            max-width: 320px;
        }
        .cta:active { opacity: 0.8; }
        .open-app {
            display: inline-block;
            color: #7dd3c0;
            font-size: 15px;
            text-decoration: none;
            padding: 12px;
        }
        .footer {
            margin-top: 48px;
            font-size: 13px;
            color: #4a5a60;
        }
        .footer a { color: #4a5a60; text-decoration: none; }
        .error-state .invite-card { display: none; }
        .error-state .error-text { display: block; }
        .error-text { display: none; font-size: 17px; color: #8a9aa0; margin-bottom: 32px; }
    </style>
</head>
<body>
    <div class="logo">SideQuestr</div>
    <div class="tagline">Discover spots. Visit with friends.</div>

    <div class="invite-card" id="inviteCard">
        <div class="avatar" id="avatar">?</div>
        <div class="handle" id="handle">Someone</div>
        <div class="invite-text">invited you to join them on SideQuestr</div>
        <a href="https://apps.apple.com/app/sidequestr/id6740043095" class="cta">Get the App</a>
        <a href="#" class="open-app" id="openApp">Already have the app? Open SideQuestr</a>
    </div>

    <p class="error-text">The page you&rsquo;re looking for doesn&rsquo;t exist.</p>

    <div class="footer">
        <a href="/">side-questr.com</a> &middot; <a href="/privacy-policy.html">Privacy</a> &middot; <a href="/terms-of-service.html">Terms</a>
    </div>

    <script>
        (function () {
            var path = window.location.pathname || '';
            var match = path.match(/^\/invite\/([^\/\?#]+)/i);
            if (match && match[1]) {
                var rawHandle = decodeURIComponent(match[1]).replace(/^@+/, '').trim();
                var safeHandle = rawHandle.replace(/[^a-zA-Z0-9_\.\-]/g, '').slice(0, 30);
                if (safeHandle.length > 0) {
                    document.getElementById('handle').textContent = '@' + safeHandle;
                    document.getElementById('avatar').textContent = safeHandle.charAt(0).toUpperCase();
                    document.title = '@' + safeHandle + ' invited you to SideQuestr';
                    document.getElementById('openApp').setAttribute('href', 'https://side-questr.com/invite/' + safeHandle);
                    return;
                }
            }
            document.body.classList.add('error-state');
        })();
    </script>
</body>
</html>
